<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 260px; padding: 20px; background: #09090B; color: #FAFAFA; margin: 0; }
    h3 { margin-top: 0; color: #FF8A00; font-size: 18px; margin-bottom: 5px; }
    p { font-size: 12px; color: #A1A1AA; margin-bottom: 15px; margin-top: 0; line-height: 1.4; }
    label { font-size: 11px; font-weight: bold; color: #A1A1AA; margin-bottom: 4px; display: block; }
    input { width: 100%; padding: 10px; box-sizing: border-box; background: #18181b; border: 1px solid #3f3f46; color: white; border-radius: 8px; font-size: 12px; outline: none; margin-bottom: 15px; }
    input:focus { border-color: #FF8A00; }
    button { width: 100%; padding: 10px; background: #FF8A00; color: #09090B; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 13px; transition: background 0.2s; }
    button:hover { background: #ea580c; }
    .status { margin-top: 12px; font-size: 12px; font-weight: bold; color: #34d399; display: none; text-align: center; }
  </style>
</head>
<body>
  <h3>Codeyx Sync</h3>
  <p>Link your account to auto-track submissions.</p>
  
  <label for="userIdInput">Codeyx User ID</label>
  <input type="text" id="userIdInput" placeholder="e.g. user_2xyz..." />
  
  <button id="saveBtn">Save Settings</button>
  <div id="statusMsg" class="status">Saved Successfully!</div>
  
  <script src="popup.js"></script>
</body>
</html>
